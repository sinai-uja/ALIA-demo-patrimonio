services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uja-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uja_iaph
      POSTGRES_USER: uja
      POSTGRES_PASSWORD: uja
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uja -d uja_iaph"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uja-net

  embedding-service:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    container_name: uja-embedding-service
    restart: unless-stopped
    ports:
      - "18001:8001"
    volumes:
      - ./backend/models/${EMBEDDING_MODEL_DIR:-MrBERT}:/app/model:ro
    env_file:
      - ./embedding/.env
    environment:
      MODEL_PATH: /app/model
      DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - uja-net

  llm-service:
    image: vllm/vllm-openai:latest
    container_name: uja-llm-service
    profiles:
      - llm
    ports:
      - "18000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HF_HUB_CACHE: /root/.cache/huggingface
    command: >
      --model BSC-LT/salamandra-7b-instruct
      --dtype bfloat16
      --max-model-len 4096
      --gpu-memory-utilization 0.9
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - uja-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uja-api
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_started
    env_file:
      - ./backend/config/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://uja:uja@postgres:5432/uja_iaph
      EMBEDDING_SERVICE_URL: http://embedding-service:8001
      LLM_SERVICE_URL: http://llm-service:8000/v1
    volumes:
      - ./backend/src:/app/src:ro
    command: uv run fastapi dev src/main.py --host 0.0.0.0 --port 8080
    networks:
      - uja-net

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18080/api/v1
    container_name: uja-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - uja-net

volumes:
  postgres_data:
  hf_cache:

networks:
  uja-net:
    driver: bridge
