# =============================================================================
# Docker Compose — IAPH RAG Monorepo
#
# All configuration is injected from the root .env file (loaded automatically).
# Service-to-service communication uses Docker network hostnames (not localhost).
#
# Usage:
#   docker compose up -d                          # infra + api + frontend
#   docker compose --profile llm up -d            # include LLM service
#   docker compose up -d postgres embedding-service  # infra only (dev)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uja-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - uja-net

  # ---------------------------------------------------------------------------
  # Embedding & Reranker service (MrBERT / Qwen3-Embedding + Qwen3-Reranker)
  # ---------------------------------------------------------------------------
  embedding-service:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    container_name: uja-embedding-service
    restart: unless-stopped
    volumes:
      - ./backend/models/${EMBEDDING_MODEL_DIR:-MrBERT}:/app/model:ro
      - ./backend/models/Qwen3-Reranker-0.6B:/app/reranker_model:ro
    environment:
      MODEL_PATH: /app/model
      RERANKER_MODEL_PATH: /app/reranker_model
      DEVICE: cuda
      POOLING_STRATEGY: ${POOLING_STRATEGY}
      MAX_LENGTH: ${MAX_LENGTH}
      RERANKER_MAX_LENGTH: ${RERANKER_MAX_LENGTH:-8192}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-4}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - uja-net

  # ---------------------------------------------------------------------------
  # LLM service — vLLM (optional, requires GPU)
  # ---------------------------------------------------------------------------
  llm-service:
    image: vllm/vllm-openai:latest
    container_name: uja-llm-service
    profiles:
      - llm
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      HF_HUB_CACHE: /root/.cache/huggingface
    command: >
      --model ${LLM_MODEL_NAME}
      --dtype bfloat16
      --max-model-len 4096
      --gpu-memory-utilization 0.9
      --api-key ${LLM_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - uja-net

  # ---------------------------------------------------------------------------
  # Backend API — FastAPI
  # ---------------------------------------------------------------------------
  api:
    image: gitlab.innovasur.es:5005/uja/iaph-rag-monorepo/backend:0.1.5
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: uja-api
    ports:
      - "${API_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_started
    environment:
      # Internal Docker network URLs (override any .env localhost values)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDING_SERVICE_URL: http://embedding-service:8001
      LLM_SERVICE_URL: http://llm-service:8000/v1
      # Pass through from .env
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      EMBEDDING_QUERY_INSTRUCTION: ${EMBEDDING_QUERY_INSTRUCTION}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS}
      LLM_ROUTE_NARRATIVE_MAX_TOKENS: ${LLM_ROUTE_NARRATIVE_MAX_TOKENS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      RAG_SIMILARITY_ONLY: ${RAG_SIMILARITY_ONLY}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD}
      RAG_TOP_K: ${RAG_TOP_K}
      RAG_RETRIEVAL_K: ${RAG_RETRIEVAL_K}
      RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP}
      CHUNKS_TABLE_VERSION: ${CHUNKS_TABLE_VERSION}
      SEARCH_RETRIEVAL_K: ${SEARCH_RETRIEVAL_K}
      SEARCH_SCORE_THRESHOLD: ${SEARCH_SCORE_THRESHOLD}
      API_V1_PREFIX: ${API_V1_PREFIX}
      PROJECT_NAME: ${PROJECT_NAME}
      DEBUG: ${DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LLM_API_KEY: ${LLM_API_KEY}
      # Reranker (served by embedding-service on the same endpoint)
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_SERVICE_URL: http://embedding-service:8001
      RERANKER_INSTRUCTION: ${RERANKER_INSTRUCTION}
      RERANKER_TOP_N: ${RERANKER_TOP_N:-50}
      # Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./backend/src:/app/src:ro
    command: uv run fastapi dev src/main.py --host 0.0.0.0 --port 8080
    networks:
      - uja-net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js (standalone)
  # ---------------------------------------------------------------------------
  frontend:
    image: gitlab.innovasur.es:5005/uja/iaph-rag-monorepo/frontend:0.1.5
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: uja-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - uja-net

volumes:
  postgres_data:
  hf_cache:

networks:
  uja-net:
    driver: bridge
